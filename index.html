<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moje Chytrá Kuchařka</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 1100px;
            width: 100%;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }

        .box {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            border: 1px solid var(--border);
            height: fit-content;
        }

        h2 { margin-top: 0; color: #0f172a; border-bottom: 2px solid var(--border); padding-bottom: 10px; }

        .surovina-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed var(--border);
        }

        .surovina-row label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-weight: 500;
            width: 100%;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: #e2e8f0;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            color: #475569;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .recept-card {
            background: #ffffff;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 2px 4px rgb(0 0 0 / 0.02);
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 300px; 
            align-items: stretch;
        }

        @media (max-width: 600px) {
            .recept-card { grid-template-columns: 1fr; }
            .recept-img-wrapper { height: 200px !important; order: -1; }
        }

        .recept-body {
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .recept-img-wrapper {
            position: relative;
            background: #f8fafc;
            border-left: 1px solid var(--border);
        }

        .recept-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 10px;
            box-sizing: border-box;
        }

        .recept-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            gap: 10px;
        }

        .recept-card h3 { margin: 0; color: #0f172a; font-size: 1.35rem; font-weight: 700; }
        
        .recept-tag {
            background: #e0e7ff;
            color: #4338ca;
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: bold;
            white-space: nowrap;
        }

        .recept-ingredience {
            margin: 10px 0 15px 0;
            background: #f8fafc;
            padding: 12px 12px 12px 30px;
            border-radius: 6px;
            font-size: 0.95rem;
            color: #475569;
        }

        .recept-postup {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #334155;
            margin-top: 12px;
            border-top: 1px solid var(--border);
            padding-top: 12px;
            white-space: pre-line;
        }

        .recept-postup strong { display: block; margin-bottom: 6px; color: #0f172a; }
        .recept-postup-krok { display: block; margin-bottom: 8px; }
        .empty-message { color: #94a3b8; text-align: center; font-style: italic; padding: 40px; }
    </style>
</head>
<body>

<div class="container">
    
    <div class="box">
        <h2>\z čeho chci vařit?</h2>
        <p style="font-size: 0.85rem; color: #64748b; margin-bottom: 15px;">
            Zaškrtni suroviny, které máš doma. Ukážou se recepty, které je obsahují.
        </p>
        <div id="spiz-seznam">
            <div class="surovina-row">
                <label>
                    <input type="checkbox" class="surovina-check" value="banán" onchange="aktualizujRecepty()">
                    🍌 Banán
                </label>
            </div>
            <div class="surovina-row">
                <label>
                    <input type="checkbox" class="surovina-check" value="kuřecí" onchange="aktualizujRecepty()">
                    🍗 Kuřecí maso
                </label>
            </div>
            <div class="surovina-row">
                <label>
                    <input type="checkbox" class="surovina-check" value="rýže" onchange="aktualizujRecepty()">
                    🍙 Rýže
                </label>
            </div>
            <div class="surovina-row">
                <label>
                    <input type="checkbox" class="surovina-check" value="hovězí mleté" onchange="aktualizujRecepty()">
                    🥩 Hovězí mleté
                </label>
            </div>
        </div>
    </div>

    <div>
        <div class="tabs">
            <button class="tab-btn active" onclick="zmenZalozku('co-mam-doma', this)">💡 Co můžu uvařit</button>
            <button class="tab-btn" onclick="zmenZalozku('Hlavní jídlo', this)">🍛 Hlavní jídla</button>
            <button class="tab-btn" onclick="zmenZalozku('Snídaně', this)">🥞 Snídaně</button>
            <button class="tab-btn" onclick="zmenZalozku('Svačina', this)">🥪 Svačiny</button>
            <button class="tab-btn" onclick="zmenZalozku('Pečení', this)">🍰 Pečení</button>
        </div>

        <div id="recepty-seznam"></div>
    </div>
</div>

<script>
    let recepty = [];
    let aktivniZalozka = "co-mam-doma";

    const jsonSoubory = [
        './hlavni_jidla.json',
        './snidane.json',
        './svaciny.json'
    ];

    async function nactiVsechnyRecepty() {
        try {
            recepty = [];
            for (const soubor of jsonSoubory) {
                const response = await fetch(soubor);
                if (response.ok) {
                    const data = await response.json();
                    recepty = recepty.concat(data);
                }
            }
            aktualizujRecepty();
        } catch (chyba) {
            console.error("Chyba při načítání receptů:", chyba);
            document.getElementById("recepty-seznam").innerHTML = 
                `<div class="empty-message" style="color:red;">Nepodařilo se načíst JSON soubory. Ujisti se, že soubory jsou ve správné složce na GitHubu.</div>`;
        }
    }

    function ziskejVybraneSuroviny() {
        const checkboxes = document.querySelectorAll('.surovina-check');
        const vybrane = [];
        checkboxes.forEach(cb => {
            if (cb.checked) {
                vybrane.push(cb.value.toLowerCase());
            }
        });
        return vybrane;
    }

    function aktualizujRecepty() {
        const vybraneSuroviny = ziskejVybraneSuroviny();
        const receptyContainer = document.getElementById("recepty-seznam");
        receptyContainer.innerHTML = "";

        if (recepty.length === 0) {
            receptyContainer.innerHTML = `<div class="empty-message">Načítám databázi jídel...</div>`;
            return;
        }

        let filtrovaneRecepty = [];

        if (aktivniZalozka === "co-mam-doma") {
            // Pokud není zaškrtnuté nic, neukazuj žádné recepty v této záložce
            if (vybraneSuroviny.length === 0) {
                receptyContainer.innerHTML = `<div class="empty-message">Zaškrtni suroviny vlevo, abys viděla odpovídající recepty.</div>`;
                return;
            }

            // Filtr: Vyber recepty, které obsahují alespoň jednu ze zaškrtnutých surovin
            filtrovaneRecepty = recepty.filter(recept => {
                if (!recept.suroviny || recept.suroviny.length === 0) return false;
                
                // Převedeme názvy všech ingrediencí v receptu do jednoho textového řetězce pro snadné hledání
                const textIngredienci = recept.suroviny.map(s => s.nazev.toLowerCase()).join(" ");
                
                // Kontrola, zda text obsahuje alespoň jednu vybranou surovinu
                return vybraneSuroviny.some(hledanaSurovina => textIngredienci.includes(hledanaSurovina));
            });
        } else {
            // Klasické filtrování podle kategorií na ostatních záložkách
            filtrovaneRecepty = recepty.filter(recept => recept.kategorie.trim().toLowerCase() === aktivniZalozka.trim().toLowerCase());
        }

        if (filtrovaneRecepty.length === 0) {
            receptyContainer.innerHTML = `<div class="empty-message">Žádné recepty neodpovídají výběru.</div>`;
            return;
        }

        filtrovaneRecepty.forEach(recept => {
            const card = document.createElement("div");
            card.className = "recept-card";
            
            const ingList = recept.suroviny
                .map(s => s.mnozstvi === 0 && s.jednotka === "" ? `<li>${s.nazev}</li>` : `<li>${s.nazev}: <strong>${s.mnozstvi} ${s.jednotka}</strong></li>`)
                .join("");

            let obrazekHtml = "";
            if (recept.obrazek && recept.obrazek !== "") {
                obrazekHtml = `<div class="recept-img-wrapper"><img src="${recept.obrazek}" class="recept-img" alt="${recept.nazev}"></div>`;
            } else {
                card.style.gridTemplateColumns = "1fr";
            }

            const krokyPostupu = recept.postup
                .split('\n')
                .map(krok => `<span class="recept-postup-krok">${krok}</span>`)
                .join("");

            card.innerHTML = `
                <div class="recept-body">
                    <div class="recept-header">
                        <h3>${recept.nazev}</h3>
                        <span class="recept-tag">${recept.kategorie.trim()}</span>
                    </div>
                    <ul class="recept-ingredience">${ingList}</ul>
                    <div class="recept-postup"><strong>Postup:</strong>${krokyPostupu}</div>
                </div>
                ${obrazekHtml}
            `;
            receptyContainer.appendChild(card);
        });
    }

    function zmenZalozku(novaZalozka, tlacitko) {
        aktivniZalozka = novaZalozka;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        tlacitko.classList.add('active');
        aktualizujRecepty();
    }

    window.addEventListener('DOMContentLoaded', nactiVsechnyRecepty);
</script>

</body>
</html>
